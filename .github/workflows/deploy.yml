name: Deploy to Cloud Run

on:
  push:
    branches: [master]

env:
  REGION: us-central1
  BACKEND_SERVICE: vocaluity-backend
  FRONTEND_SERVICE: vocaluity-frontend
  REGISTRY: us-central1-docker.pkg.dev

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vocaluity/backend:${{ github.sha }}"
          docker build -f infra/backend.Dockerfile -t "$IMAGE" .
          docker tag "$IMAGE" "${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vocaluity/backend:latest"
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vocaluity/backend:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        id: build

      - name: Deploy backend to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --service-account "vocaluity-backend@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars "MODEL_BUCKET=${{ secrets.GCP_PROJECT_ID }}-vocaluity-models,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontend image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vocaluity/frontend:${{ github.sha }}"
          docker build -f infra/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url }} \
            -t "$IMAGE" .
          docker tag "$IMAGE" "${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vocaluity/frontend:latest"
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vocaluity/frontend:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        id: build

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --update-env-vars "NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url }}" \
            --quiet

          FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")

          # Update backend CORS with the frontend URL
          gcloud run services update ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --update-env-vars "ALLOWED_ORIGINS=${FRONTEND_URL}" \
            --quiet
